<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de PDA</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="container">

<h1>Control de PDA por Línea</h1>

<div class="card">

<h2>Consultar Línea</h2>

<select id="buscarLinea">
<option value="">Seleccione una línea</option>
</select>

<button onclick="consultarLinea()">
Consultar
</button>

</div>

<div class="card">

<h2>Buscar PDA</h2>

<input
type="text"
id="buscarPda"
placeholder="PDA-001">

<button onclick="buscarPDA()">
Buscar
</button>

<p id="resultadoBusqueda"></p>

</div>

<div class="card">

<h2>Asignación</h2>

<p>
Línea Actual:
<strong id="lineaActual">
Ninguna
</strong>
</p>

<button onclick="activarEscanerLinea()">
Escanear Línea
</button>

<button onclick="activarEscanerPDA()">
Escanear PDA
</button>

</div>

<div class="card">

<h2>PDAs de la Línea</h2>

<p id="contadorPDA">
0 PDAs
</p>

<table>

<thead>

<tr>
<th>PDA</th>
<th>Fecha</th>
</tr>

</thead>

<tbody id="tablaAsignaciones">

</tbody>

</table>

</div>

</div>

<div id="modalScanner" class="modal">

<div class="modal-content">

<span class="cerrar"
onclick="cerrarScanner()">

&times;

</span>

<div id="reader"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
