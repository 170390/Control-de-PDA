<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de PDA</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="container">

<h1>Control de PDA por Línea</h1>

<div class="card">

<h2>Consultar Línea</h2>

<select id="buscarLinea"></select>

<button onclick="consultarLinea()">
Consultar Línea
</button>

</div>

<div class="card">

<h2>Buscar PDA</h2>

<input
type="text"
id="buscarPda"
placeholder="PDA-001">

<button onclick="buscarPDA()">
Buscar PDA
</button>

<p id="resultadoBusqueda"></p>

</div>

<div class="card">

<h2>Asignación</h2>

<p>
<strong>Línea Actual:</strong>
<span id="lineaActual">
Ninguna
</span>
</p>

<button onclick="activarEscanerLinea()">
Escanear Línea
</button>

<button onclick="activarEscanerPDA()">
Escanear PDA
</button>

</div>

<div class="card">

<h2>PDAs Asignadas</h2>

<p id="contadorPDA">
0 PDAs
</p>

<table>

<thead>

<tr>
<th>PDA</th>
<th>Fecha</th>
</tr>

</thead>

<tbody id="tablaAsignaciones">

</tbody>

</table>

</div>

</div>

<div id="modalScanner" class="modal">

<div class="modal-content">

<button
class="btnCerrar"
onclick="cerrarScanner()">

Cerrar

</button>

<div id="reader"></div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
